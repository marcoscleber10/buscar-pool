<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrazilDeFi Explorer - Pools de Stablecoins BR</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --border-color: #2a2a3a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent-blue: #00d4ff;
            --accent-purple: #7b2cbf;
            --success: #00ff88;
            --warning: #ffa500;
            --danger: #ff4757;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-card) 100%);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            font-size: 12px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 10px;
        }

        .stat-value {
            font-weight: 700;
            color: var(--accent-blue);
        }

        /* ===== TABS NAVIGATION ===== */
        .tabs-container {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 0;
        }

        .tabs {
            display: flex;
            gap: 5px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .tab-btn {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 8px 8px 0 0;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn:hover {
            color: var(--text-primary);
            border-color: var(--accent-blue);
        }

        .tab-btn.active {
            background: var(--bg-card);
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            border-bottom: 2px solid var(--bg-card);
        }

        .tab-btn .badge {
            background: var(--accent-blue);
            color: #000;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 700;
        }

        .tab-btn.bitcoin .badge { background: #f7931a; color: #fff; }
        .tab-btn.stocks .badge { background: var(--success); color: #000; }

        /* Search Section */
        .search-section {
            padding: 25px 0;
            background: var(--bg-secondary);
        }

        .search-box {
            position: relative;
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            transition: all 0.3s;
        }

        .search-box:focus-within {
            border-color: var(--accent-blue);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: var(--accent-blue);
        }

        .search-input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 15px;
        }

        .search-input:focus {
            outline: none;
        }

        .search-tags {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent-blue);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .tag:hover {
            background: rgba(0, 212, 255, 0.2);
        }

        /* Filters */
        .filters-section {
            padding: 20px 0;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .filter-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 15px;
        }

        .filter-title {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filter-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 150px;
            overflow-y: auto;
        }

        .filter-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .filter-option input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent-blue);
            cursor: pointer;
        }

        .filter-option label {
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .network-icon {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
        }

        .tvl-input {
            width: 100%;
            padding: 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
        }

        /* Main Content */
        .main-content {
            padding: 25px 0;
            min-height: 400px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
        }

        .results-count {
            color: var(--text-secondary);
            font-size: 13px;
        }

        /* Table */
        .pools-table-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            overflow-x: auto;
        }

        .pools-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .pools-table thead {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        .pools-table th {
            padding: 12px 10px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .pools-table td {
            padding: 12px 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .pools-table tbody tr {
            transition: all 0.2s;
            cursor: pointer;
        }

        .pools-table tbody tr:hover {
            background: rgba(0, 212, 255, 0.05);
        }

        .pool-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .pool-name {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .token-badge {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 11px;
        }

        .token-badge.btc { background: linear-gradient(135deg, #f7931a, #ffaa33); }
        .token-badge.stock { background: linear-gradient(135deg, var(--success), #00cc66); }

        .network-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            background: rgba(255, 255, 255, 0.1);
        }

        .protocol-badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent-blue);
        }

        /* Risk Semaphore */
        .risk-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .risk-low {
            background: rgba(0, 255, 136, 0.15);
            color: var(--success);
        }

        .risk-medium {
            background: rgba(255, 165, 0, 0.15);
            color: var(--warning);
        }

        .risk-high {
            background: rgba(255, 71, 87, 0.15);
            color: var(--danger);
        }

        .semaphore-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .risk-low .semaphore-dot { background: var(--success); }
        .risk-medium .semaphore-dot { background: var(--warning); }
        .risk-high .semaphore-dot { background: var(--danger); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .value-positive {
            color: var(--success);
            font-weight: 600;
        }

        .external-link {
            color: var(--accent-blue);
            margin-left: 5px;
            font-size: 10px;
        }

        /* Loading & Empty States */
        .loading, .no-results {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .no-results i {
            font-size: 40px;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-color);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        /* Tab Content */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }

            .stats-bar {
                justify-content: center;
                gap: 15px;
            }

            .tabs {
                overflow-x: auto;
                padding-bottom: 5px;
            }

            .filters-grid {
                grid-template-columns: 1fr;
            }

            .pools-table {
                font-size: 12px;
            }

            .pools-table th,
            .pools-table td {
                padding: 8px 5px;
            }

            .token-badge, .network-badge, .protocol-badge {
                font-size: 10px;
                padding: 2px 6px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-search-dollar"></i>
                    BrazilDeFi Explorer
                </div>
                <div class="stats-bar">
                    <div class="stat-item">
                        <span class="stat-label">Total TVL</span>
                        <span class="stat-value" id="totalTVL">$2.4B</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Pools Ativas</span>
                        <span class="stat-value" id="totalPools">156</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Melhor APR</span>
                        <span class="stat-value" id="bestAPR">45.2%</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- ===== TABS NAVIGATION ===== -->
    <nav class="tabs-container">
        <div class="tabs">
            <button class="tab-btn active" data-tab="stablecoins" onclick="switchTab('stablecoins')">

            <button class="tab-btn bitcoin" data-tab="bitcoin" onclick="switchTab('bitcoin')">

            </button>
            <button class="tab-btn stocks" data-tab="stocks" onclick="switchTab('stocks')">
                <i class="fas fa-chart-line"></i>
                Stocks Top 10
                <span class="badge" id="badge-stocks">10</span>
            </button>
        </div>
    </nav>

    <!-- Search Section -->

    </section>

    <!-- Filters Section -->
    <section class="filters-section">

            <div class="filters-grid">

                            <label for="base"><span class="network-icon" style="background: #0052ff;">B</span> Base</label>
                        </div>
                    </div>
                </div>

                <!-- Protocol Filter -->
                <div class="filter-card">
                    <div class="filter-title">
                        <i class="fas fa-exchange-alt"></i>
                        Protocolos
                    </div>
                    <div class="filter-options" id="protocolFilters">
                        <div class="filter-option">
                            <input type="checkbox" id="uniswap" value="uniswap" checked>
                            <label for="uniswap">Uniswap V3</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="pancake" value="pancakeswap" checked>
                            <label for="pancake">PancakeSwap</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="curve" value="curve">
                            <label for="curve">Curve Finance</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="balancer" value="balancer">
                            <label for="balancer">Balancer</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="sushiswap" value="sushiswap">
                            <label for="sushiswap">SushiSwap</label>
                        </div>
                    </div>
                </div>

                <!-- TVL Filter -->
                <div class="filter-card">
                    <div class="filter-title">
                        <i class="fas fa-coins"></i>
                        TVL Mínimo
                    </div>
                    <input 
                        type="number" 
                        class="tvl-input" 
                        id="tvlFilter"
                        placeholder="Valor mínimo em USD"
                        min="0"
                        step="1000"
                    >
                </div>

                <!-- Risk Filter -->
                <div class="filter-card">
                    <div class="filter-title">
                        <i class="fas fa-shield-alt"></i>
                        Nível de Risco
                    </div>
                    <div class="filter-options">
                        <div class="filter-option">
                            <input type="checkbox" id="riskLow" value="low" checked>
                            <label for="riskLow"><span style="color: var(--success);">●</span> Baixo</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="riskMedium" value="medium" checked>
                            <label for="riskMedium"><span style="color: var(--warning);">●</span> Médio</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="riskHigh" value="high">
                            <label for="riskHigh"><span style="color: var(--danger);">●</span> Alto</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Main Content -->

            <div class="section-header">

                    <i class="fas fa-list" style="margin-right: 8px; color: var(--accent-blue);"></i>

                <span class="results-count" id="resultsCount">Carregando...</span>
            </div>

                            <th id="volumeHeader">Volume 24h</th>
                            <th>APR</th>
                            <th>Risco</th>
                        </tr>
                    </thead>
                    <tbody id="poolsTableBody">

                    </tbody>
                </table>
            </div>
        </div>
    </main>

            { pool: 'BRZ/MATIC', network: 'polygon', networkName: 'Polygon', protocol: 'uniswap', protocolName: 'Uniswap V3', tvl: 890000, ratio: '46/54', volume24h: 178000, apr: 21.4, risk: 'medium', link: 'https://app.uniswap.org/#/pool' },
            { pool: 'BRL1/USDC', network: 'ethereum', networkName: 'Ethereum', protocol: 'uniswap', protocolName: 'Uniswap V3', tvl: 567000, ratio: '50/50', volume24h: 123000, apr: 17.8, risk: 'low', link: 'https://app.uniswap.org/#/pool' },
            { pool: 'BRZ/DAI', network: 'ethereum', networkName: 'Ethereum', protocol: 'curve', protocolName: 'Curve Finance', tvl: 2890000, ratio: '51/49', volume24h: 445000, apr: 11.2, risk: 'low', link: 'https://curve.fi/#/ethereum/pools' }
        ];

        // ===== DADOS: BITCOIN POOLS (COM API DEFILLAMA) =====
        let bitcoinData = [];
        const bitcoinTokens = ['WBTC', 'cbBTC'];
        const bitcoinProtocols = ['uniswap', 'curve', 'balancer'];

        // ===== DADOS: STOCKS TOP 10 (PROXY MARKET CAP) =====
        const stocksData = [
            { pool: 'AAPL/USDC', asset: 'Apple', network: 'ethereum', networkName: 'Ethereum', protocol: 'uniswap', protocolName: 'Uniswap V3', tvl: 2800000000000, ratio: 'N/A', volume24h: 8900000000, apr: 0, risk: 'low', link: 'https://app.uniswap.org/#/pool', isStock: true },
            { pool: 'MSFT/USDC', asset: 'Microsoft', network: 'ethereum', networkName: 'Ethereum', protocol: 'uniswap', protocolName: 'Uniswap V3', tvl: 2900000000000, ratio: 'N/A', volume24h: 7200000000, apr: 0, risk: 'low', link: 'https://app.uniswap.org/#/pool', isStock: true },
            { pool: 'NVDA/USDC', asset: 'NVIDIA', network: 'ethereum', networkName: 'Ethereum', protocol: 'uniswap', protocolName: 'Uniswap V3', tvl: 2200000000000, ratio: 'N/A', volume24h: 12000000000, apr: 0, risk: 'medium', link: 'https://app.uniswap.org/#/pool', isStock: true },
            { pool: 'AMZN/USDC', asset: 'Amazon', network: 'ethereum', networkName: 'Ethereum', protocol: 'uniswap', protocolName: 'Uniswap V3', tvl: 1600000000000, ratio: 'N/A', volume24h: 5400000000, apr: 0, risk: 'low', link: 'https://app.uniswap.org/#/pool', isStock: true },
            { pool: 'GOOGL/USDC', asset: 'Alphabet', network: 'ethereum', networkName: 'Ethereum', protocol: 'uniswap', protocolName: 'Uniswap V3', tvl: 1800000000000, ratio: 'N/A', volume24h: 4800000000, apr: 0, risk: 'low', link: 'https://app.uniswap.org/#/pool', isStock: true },
            { pool: 'META/USDC', asset: 'Meta', network: 'ethereum', networkName: 'Ethereum', protocol: 'uniswap', protocolName: 'Uniswap V3', tvl: 950000000000, ratio: 'N/A', volume24h: 6100000000, apr: 0, risk: 'medium', link: 'https://app.uniswap.org/#/pool', isStock: true },
            { pool: 'TSLA/USDC', asset: 'Tesla', network: 'ethereum', networkName: 'Ethereum', protocol: 'uniswap', protocolName: 'Uniswap V3', tvl: 780000000000, ratio: 'N/A', volume24h: 9800000000, apr: 0, risk: 'high', link: 'https://app.uniswap.org/#/pool', isStock: true },
            { pool: 'BRK.B/USDC', asset: 'Berkshire', network: 'ethereum', networkName: 'Ethereum', protocol: 'balancer', protocolName: 'Balancer', tvl: 890000000000, ratio: 'N/A', volume24h: 1200000000, apr: 0, risk: 'low', link: 'https://app.balancer.fi/#/ethereum/pool', isStock: true },
            { pool: 'LLY/USDC', asset: 'Eli Lilly', network: 'ethereum', networkName: 'Ethereum', protocol: 'uniswap', protocolName: 'Uniswap V3', tvl: 720000000000, ratio: 'N/A', volume24h: 2100000000, apr: 0, risk: 'medium', link: 'https://app.uniswap.org/#/pool', isStock: true },
            { pool: 'AVGO/USDC', asset: 'Broadcom', network: 'ethereum', networkName: 'Ethereum', protocol: 'uniswap', protocolName: 'Uniswap V3', tvl: 680000000000, ratio: 'N/A', volume24h: 3400000000, apr: 0, risk: 'medium', link: 'https://app.uniswap.org/#/pool', isStock: true }
        ];

        // ===== ESTADO GLOBAL =====
        let currentTab = 'stablecoins';
        let currentData = [...stablecoinsData];

        // ===== INICIALIZAÇÃO =====
        document.addEventListener('DOMContentLoaded', () => {
            renderTable(currentData);
            setupFilters();
            setupSearch();
            fetchBitcoinData(); // Carrega dados do Bitcoin via API
        });

        // ===== SISTEMA DE ABAS =====
        function switchTab(tabName) {
            currentTab = tabName;
            
            // Atualiza botões das abas
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
            
            // Atualiza título da seção
            const titles = {
                stablecoins: 'Pools de Stablecoins BR',
                bitcoin: 'Pools de Bitcoin Tokenizado',
                stocks: 'Stocks Tokenizadas - Top 10'
            };
            document.getElementById('sectionTitle').textContent = titles[tabName];
            
            // Atualiza headers da tabela
            const tvlHeader = document.getElementById('tvlHeader');
            const volumeHeader = document.getElementById('volumeHeader');
            if (tabName === 'stocks') {
                tvlHeader.textContent = 'Market Cap';
                volumeHeader.textContent = 'Volume Diário';
            } else {
                tvlHeader.textContent = 'TVL';
                volumeHeader.textContent = 'Volume 24h';
            }
            
            // Atualiza tags de busca
            updateSearchTags(tabName);
            
            // Carrega dados da aba
            loadDataForTab(tabName);
        }

        function updateSearchTags(tab) {
            const tagsContainer = document.getElementById('searchTags');
            const tags = {
                stablecoins: ['BRZ', 'BRL1', 'BRLA', 'Depix', 'CREAL', 'USDC', 'USDT'],
                bitcoin: ['WBTC', 'cbBTC', 'BTC', 'ETH', 'USDC'],
                stocks: ['AAPL', 'MSFT', 'NVDA', 'AMZN', 'GOOGL', 'META', 'TSLA']
            };
            tagsContainer.innerHTML = tags[tab].map(tag => 
                `<span class="tag" onclick="searchTag('${tag}')">${tag}</span>`
            ).join('');
        }

        function loadDataForTab(tab) {
            if (tab === 'stablecoins') {
                currentData = [...stablecoinsData];
                renderTable(currentData);
            } else if (tab === 'bitcoin') {
                if (bitcoinData.length > 0) {
                    currentData = [...bitcoinData];
                    renderTable(currentData);
                } else {
                    showLoading();
                }
            } else if (tab === 'stocks') {
                currentData = [...stocksData];
                renderTable(currentData);
            }
            filterData(); // Aplica filtros atuais
        }

        function showLoading() {
            const tbody = document.getElementById('poolsTableBody');
            tbody.innerHTML = `
                <tr>
                    <td colspan="8" class="loading">
                        <span class="loading-spinner"></span>
                        Buscando dados da DefiLlama API...
                    </td>
                </tr>
            `;
        }

        // ===== API DEFILLAMA PARA BITCOIN POOLS =====
        async function fetchBitcoinData() {
            try {
                // Tenta buscar dados reais da DefiLlama
                const response = await fetch('https://yields.llama.fi/pools');
                const data = await response.json();
                
                // Filtra pools com WBTC ou cbBTC
                const btcPools = data.data
                    .filter(pool => {
                        const symbols = (pool.symbol || '').toUpperCase();
                        return bitcoinTokens.some(token => symbols.includes(token)) &&
                               bitcoinProtocols.some(proto => pool.project?.includes(proto));
                    })
                    .slice(0, 20) // Limita a 20 pools
                    .map(pool => ({
                        pool: pool.symbol || 'WBTC/USDC',
                        network: pool.chain?.toLowerCase() || 'ethereum',
                        networkName: pool.chain || 'Ethereum',
                        protocol: pool.project || 'uniswap',
                        protocolName: formatProtocolName(pool.project),
                        tvl: pool.tvlUsd || 0,
                        ratio: 'N/A',
                        volume24h: pool.volumeUsd1d || pool.tvlUsd * 0.1,
                        apr: pool.apy || 0,
                        risk: calculateRisk(pool.tvlUsd, pool.apy),
                        link: getProtocolLink(pool.project, pool.chain)
                    }));
                
                if (btcPools.length > 0) {
                    bitcoinData = btcPools;
                    if (currentTab === 'bitcoin') {
                        currentData = [...bitcoinData];
                        renderTable(currentData);
                    }
                    updateBadge('bitcoin', btcPools.length);
                } else {
                    useMockBitcoinData();
                }
            } catch (error) {
                console.log('Usando dados mock para Bitcoin:', error);
                useMockBitcoinData();
            }
        }

        function useMockBitcoinData() {
            bitcoinData = [
                { pool: 'WBTC/USDC', network: 'ethereum', networkName: 'Ethereum', protocol: 'uniswap', protocolName: 'Uniswap V3', tvl: 125000000, ratio: '51/49', volume24h: 45000000, apr: 8.5, risk: 'low', link: 'https://app.uniswap.org/#/pool' },
                { pool: 'WBTC/ETH', network: 'ethereum', networkName: 'Ethereum', protocol: 'uniswap', protocolName: 'Uniswap V3', tvl: 234000000, ratio: '48/52', volume24h: 89000000, apr: 12.3, risk: 'low', link: 'https://app.uniswap.org/#/pool' },
                { pool: 'WBTC/USDT', network: 'ethereum', networkName: 'Ethereum', protocol: 'curve', protocolName: 'Curve Finance', tvl: 89000000, ratio: '50/50', volume24h: 23000000, apr: 6.8, risk: 'low', link: 'https://curve.fi/#/ethereum/pools' },
                { pool: 'cbBTC/USDC', network: 'ethereum', networkName: 'Ethereum', protocol: 'uniswap', protocolName: 'Uniswap V3', tvl: 45000000, ratio: '53/47', volume24h: 12000000, apr: 15.2, risk: 'medium', link: 'https://app.uniswap.org/#/pool' },
                { pool: 'WBTC/DAI', network: 'ethereum', networkName: 'Ethereum', protocol: 'balancer', protocolName: 'Balancer', tvl: 34000000, ratio: '49/51', volume24h: 8900000, apr: 9.4, risk: 'low', link: 'https://app.balancer.fi/#/ethereum/pool' },
                { pool: 'WBTC/USDC', network: 'polygon', networkName: 'Polygon', protocol: 'uniswap', protocolName: 'Uniswap V3', tvl: 23000000, ratio: '52/48', volume24h: 6700000, apr: 11.8, risk: 'low', link: 'https://app.uniswap.org/#/pool' },
                { pool: 'WBTC/USDT', network: 'arbitrum', networkName: 'Arbitrum', protocol: 'sushiswap', protocolName: 'SushiSwap', tvl: 18000000, ratio: '47/53', volume24h: 4500000, apr: 14.6, risk: 'medium', link: 'https://www.sushi.com/pool' },
                { pool: 'cbBTC/ETH', network: 'base', networkName: 'Base', protocol: 'uniswap', protocolName: 'Uniswap V3', tvl: 56000000, ratio: '45/55', volume24h: 18000000, apr: 18.9, risk: 'medium', link: 'https://app.uniswap.org/#/pool' }
            ];
            if (currentTab === 'bitcoin') {
                currentData = [...bitcoinData];
                renderTable(currentData);
            }
            updateBadge('bitcoin', bitcoinData.length);
        }

        function formatProtocolName(name) {
            const names = {
                'uniswap': 'Uniswap V3',
                'curve': 'Curve Finance',
                'balancer': 'Balancer',
                'pancakeswap': 'PancakeSwap',
                'sushiswap': 'SushiSwap'
            };
            return names[name] || name;
        }

        function getProtocolLink(project, chain) {
            const links = {
                'uniswap': 'https://app.uniswap.org/#/pool',
                'curve': `https://curve.fi/#/${chain || 'ethereum'}/pools`,
                'balancer': 'https://app.balancer.fi/#/ethereum/pool',
                'pancakeswap': 'https://pancakeswap.finance/liquidity',
                'sushiswap': 'https://www.sushi.com/pool'
            };
            return links[project] || links['uniswap'];
        }

        function calculateRisk(tvl, apr) {
            if (tvl > 50000000 && apr < 15) return 'low';
            if (tvl > 10000000 || apr < 25) return 'medium';
            return 'high';
        }

        function updateBadge(tab, count) {
            const badge = document.getElementById(`badge-${tab}`);
            if (badge) badge.textContent = count;
        }

        // ===== FUNÇÕES EXISTENTES (NÃO ALTERADAS) =====
        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', () => filterData());
        }

        function searchTag(tag) {
            document.getElementById('searchInput').value = tag;
            filterData();
        }

        function setupFilters() {
            document.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
                checkbox.addEventListener('change', () => filterData());
            });
            document.getElementById('tvlFilter').addEventListener('input', () => filterData());
        }

        function filterData() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const tvlMin = parseFloat(document.getElementById('tvlFilter').value) || 0;
            
            const selectedNetworks = Array.from(document.querySelectorAll('#networkFilters input:checked')).map(cb => cb.value);
            const selectedProtocols = Array.from(document.querySelectorAll('#protocolFilters input:checked')).map(cb => cb.value);
            const selectedRisks = Array.from(document.querySelectorAll('input[id^="risk"]:checked')).map(cb => cb.value);

            currentData = currentData.filter(pool => {
                const matchesSearch = !searchTerm || 
                    pool.pool.toLowerCase().includes(searchTerm) ||
                    pool.networkName.toLowerCase().includes(searchTerm) ||
                    pool.protocolName.toLowerCase().includes(searchTerm) ||
                    (pool.asset && pool.asset.toLowerCase().includes(searchTerm));
                
                const matchesNetwork = selectedNetworks.includes(pool.network);
                const matchesProtocol = selectedProtocols.includes(pool.protocol);
                const matchesTVL = pool.tvl >= tvlMin;
                const matchesRisk = selectedRisks.includes(pool.risk);

                return matchesSearch && matchesNetwork && matchesProtocol && matchesTVL && matchesRisk;
            });

            renderTable(currentData);
            updateStats();
        }

        function renderTable(data) {
            const tbody = document.getElementById('poolsTableBody');
            const resultsCount = document.getElementById('resultsCount');
            
            resultsCount.textContent = `${data.length} itens encontrados`;

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8"><div class="no-results"><i class="fas fa-search"></i><p>Nenhum item encontrado com os filtros selecionados</p></div></td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(pool => {
                const tokenClass = pool.isStock ? 'stock' : (pool.pool.includes('WBTC') || pool.pool.includes('cbBTC') ? 'btc' : '');
                const token1 = pool.isStock ? pool.asset : pool.pool.split('/')[0];
                const token2 = pool.pool.split('/')[1];
                
                return `
                <tr>
                    <td>
                        <a href="${pool.link}" target="_blank" class="pool-link">
                            <div class="pool-name">
                                <span class="token-badge ${tokenClass}">${token1}</span>
                                <span style="color: var(--text-secondary);">/</span>
                                <span class="token-badge">${token2}</span>
                                <i class="fas fa-external-link-alt external-link"></i>
                            </div>
                        </a>
                    </td>
                    <td><span class="network-badge">${pool.networkName}</span></td>
                    <td><span class="protocol-badge">${pool.protocolName}</span></td>
                    <td class="value-neutral">$${formatNumber(pool.tvl)}</td>
                    <td class="value-neutral">${pool.ratio}</td>
                    <td class="value-neutral">$${formatNumber(pool.volume24h)}</td>
                    <td class="value-positive">${pool.apr.toFixed(2)}%</td>
                    <td>
                        <span class="risk-indicator risk-${pool.risk}">
                            <span class="semaphore-dot"></span>
                            ${pool.risk === 'low' ? 'Baixo' : pool.risk === 'medium' ? 'Médio' : 'Alto'}
                        </span>
                    </td>
                </tr>`;
            }).join('');
        }

        function formatNumber(num) {
            if (num >= 1e12) return '$' + (num / 1e12).toFixed(2) + 'T';
            if (num >= 1e9) return '$' + (num / 1e9).toFixed(2) + 'B';
            if (num >= 1e6) return '$' + (num / 1e6).toFixed(2) + 'M';
            if (num >= 1e3) return '$' + (num / 1e3).toFixed(2) + 'K';
            return '$' + num.toFixed(2);
        }

        function updateStats() {
            const totalTVL = currentData.reduce((sum, p) => sum + (p.tvl || 0), 0);
            const bestAPR = Math.max(...currentData.map(p => p.apr || 0));
            
            document.getElementById('totalTVL').textContent = formatNumber(totalTVL);
            document.getElementById('totalPools').textContent = currentData.length;
            document.getElementById('bestAPR').textContent = bestAPR > 0 ? bestAPR.toFixed(1) + '%' : 'N/A';
        }
    </script>
</body>
</html>
