<head>
    <meta charset="UTF-8">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --border-color: #2a2a3a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent-blue: #00d4ff;
            --accent-purple: #7b2cbf;
            --success: #00ff88;
            --warning: #ffa500;
            --danger: #ff4757;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-card) 100%);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            font-size: 12px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 10px;
        }

        .stat-value {
            font-weight: 700;
            color: var(--accent-blue);
        }

        /* Search Section */
        .search-section {
            padding: 25px 0;
            background: var(--bg-secondary);
        }

        .search-box {
            position: relative;
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            transition: all 0.3s;
        }

        .search-box:focus-within {
            border-color: var(--accent-blue);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: var(--accent-blue);
        }

        .search-input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 15px;
        }

        .search-input:focus {
            outline: none;
        }

        .search-tags {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent-blue);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .tag:hover {
            background: rgba(0, 212, 255, 0.2);
        }

        /* Filters */
        .filters-section {
            padding: 20px 0;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .filter-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 15px;
        }

        .filter-title {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filter-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 150px;
            overflow-y: auto;
        }

        .filter-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .filter-option input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent-blue);
            cursor: pointer;
        }

        .filter-option label {
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .network-icon {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
        }

        .tvl-input {
            width: 100%;
            padding: 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
        }

        /* Main Content */
        .main-content {
            padding: 25px 0;
            min-height: 400px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
        }

        .results-count {
            color: var(--text-secondary);
            font-size: 13px;
        }

        /* Table */
        .pools-table-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            overflow-x: auto;
        }

        .pools-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .pools-table thead {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        .pools-table th {
            padding: 12px 10px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .pools-table td {
            padding: 12px 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .pools-table tbody tr {
            transition: all 0.2s;
            cursor: pointer;
        }

        .pools-table tbody tr:hover {
            background: rgba(0, 212, 255, 0.05);
        }

        .pool-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .pool-name {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .token-badge {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 11px;
        }

        .network-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            background: rgba(255, 255, 255, 0.1);
        }

        .protocol-badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent-blue);
        }

        /* Risk Semaphore */
        .risk-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .risk-low {
            background: rgba(0, 255, 136, 0.15);
            color: var(--success);
        }

        .risk-medium {
            background: rgba(255, 165, 0, 0.15);
            color: var(--warning);
        }

        .risk-high {
            background: rgba(255, 71, 87, 0.15);
            color: var(--danger);
        }

        .semaphore-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .risk-low .semaphore-dot { background: var(--success); }
        .risk-medium .semaphore-dot { background: var(--warning); }
        .risk-high .semaphore-dot { background: var(--danger); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .value-positive {
            color: var(--success);
            font-weight: 600;
        }

        .external-link {
            color: var(--accent-blue);
            margin-left: 5px;
            font-size: 10px;
        }

        /* Loading & Empty States */
        .loading, .no-results {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .no-results i {
            font-size: 40px;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }

            .stats-bar {
                justify-content: center;
                gap: 15px;
            }

            .filters-grid {
                grid-template-columns: 1fr;
            }

            .pools-table {
                font-size: 12px;
            }

            .pools-table th,
            .pools-table td {
                padding: 8px 5px;
            }

            .token-badge, .network-badge, .protocol-badge {
                font-size: 10px;
                padding: 2px 6px;
            }
        }
    </style>
</head>

            const selectedNetworks = Array.from(document.querySelectorAll('#networkFilters input:checked'))
                .map(cb => cb.value);
            
            const selectedProtocols = Array.from(document.querySelectorAll('#protocolFilters input:checked'))
                .map(cb => cb.value);
            
            const selectedRisks = Array.from(document.querySelectorAll('input[id^="risk"]:checked'))
                .map(cb => cb.value);

            currentData = poolsData.filter(pool => {
                const matchesSearch = !searchTerm || 
                    pool.pool.toLowerCase().includes(searchTerm) ||
                    pool.networkName.toLowerCase().includes(searchTerm) ||
                    pool.protocolName.toLowerCase().includes(searchTerm);
                
                const matchesNetwork = selectedNetworks.includes(pool.network);
                const matchesProtocol = selectedProtocols.includes(pool.protocol);
                const matchesTVL = pool.tvl >= tvlMin;
                const matchesRisk = selectedRisks.includes(pool.risk);

                return matchesSearch && matchesNetwork && matchesProtocol && matchesTVL && matchesRisk;
            });

            renderTable(currentData);
        }

        function renderTable(data) {
            const tbody = document.getElementById('poolsTableBody');
            const resultsCount = document.getElementById('resultsCount');
            const totalPools = document.getElementById('totalPools');
            
            resultsCount.textContent = `${data.length} pools encontradas`;
            totalPools.textContent = data.length;

            if (data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8">
                            <div class="no-results">
                                <i class="fas fa-search"></i>
                                <p>Nenhuma pool encontrada com os filtros selecionados</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = data.map(pool => `
                <tr>
                    <td>
                        <a href="${pool.link}" target="_blank" class="pool-link">
                            <div class="pool-name">
                                <span class="token-badge">${pool.pool.split('/')[0]}</span>
                                <span style="color: var(--text-secondary);">/</span>
                                <span class="token-badge">${pool.pool.split('/')[1]}</span>
                                <i class="fas fa-external-link-alt external-link"></i>
                            </div>
                        </a>
                    </td>
                    <td>
                        <span class="network-badge">${pool.networkName}</span>
                    </td>
                    <td>
                        <span class="protocol-badge">${pool.protocolName}</span>
                    </td>
                    <td class="value-neutral">$${formatNumber(pool.tvl)}</td>
                    <td class="value-neutral">${pool.ratio}</td>
                    <td class="value-neutral">$${formatNumber(pool.volume24h)}</td>
                    <td class="value-positive">${pool.apr.toFixed(2)}%</td>
                    <td>
                        <span class="risk-indicator risk-${pool.risk}">
                            <span class="semaphore-dot"></span>
                            ${pool.risk === 'low' ? 'Baixo' : pool.risk === 'medium' ? 'Médio' : 'Alto'}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        function formatNumber(num) {
            if (num >= 1000000) {
                return (num / 1000000).toFixed(2) + 'M';
            } else if (num >= 1000) {
                return (num / 1000).toFixed(2) + 'K';
            }
            return num.toFixed(2);
        }
    </script>
</body>
</html>
