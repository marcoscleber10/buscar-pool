<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrazilDeFi Explorer - Encontre as Melhores Pools DeFi</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --border-color: #2a2a3a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent-blue: #00d4ff;
            --accent-purple: #7b2cbf;
            --success: #00ff88;
            --warning: #ffa500;
            --danger: #ff4757;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .header {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-card) 100%);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            font-size: 12px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 10px;
        }

        .stat-value {
            font-weight: 700;
            color: var(--accent-blue);
        }

        .tabs-container {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 0;
        }

        .tabs {
            display: flex;
            gap: 5px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 15px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 8px 8px 0 0;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn:hover {
            color: var(--text-primary);
            border-color: var(--accent-blue);
        }

        .tab-btn.active {
            background: var(--bg-card);
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            border-bottom: 2px solid var(--bg-card);
        }

        .tab-btn .badge {
            background: var(--accent-blue);
            color: #000;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 700;
        }

        .tab-btn.topapr .badge { background: #ff00ff; color: #fff; }
        .tab-btn.bitcoin .badge { background: #f7931a; color: #fff; }
        .tab-btn.stocks .badge { background: var(--success); color: #000; }

        .sector-filter {
            padding: 15px 0;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
        }

        .sector-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .sector-btn {
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sector-btn:hover {
            border-color: var(--accent-blue);
            color: var(--text-primary);
        }

        .sector-btn.active {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-color: transparent;
            color: #000;
        }

        .search-section {
            padding: 25px 0;
            background: var(--bg-secondary);
        }

        .search-box {
            position: relative;
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            transition: all 0.3s;
        }

        .search-box:focus-within {
            border-color: var(--accent-blue);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: var(--accent-blue);
        }

        .search-input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 15px;
        }

        .search-input:focus {
            outline: none;
        }

        .search-tags {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent-blue);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .tag:hover {
            background: rgba(0, 212, 255, 0.2);
        }

        .filters-section {
            padding: 20px 0;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .filter-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 15px;
        }

        .filter-title {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filter-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        .filter-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .filter-option input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent-blue);
            cursor: pointer;
        }

        .filter-option label {
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .network-icon {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
        }

        .tvl-input {
            width: 100%;
            padding: 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
        }

        .main-content {
            padding: 25px 0;
            min-height: 400px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
        }

        .results-count {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .pools-table-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            overflow-x: auto;
        }

        .pools-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .pools-table thead {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        .pools-table th {
            padding: 12px 10px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
        }

        .pools-table th:hover {
            color: var(--accent-blue);
            background: rgba(0, 212, 255, 0.1);
        }

        .pools-table th.sortable::after {
            content: ' \2195';
            font-size: 10px;
            opacity: 0.5;
        }

        .pools-table th.sort-asc::after {
            content: ' \2191';
            opacity: 1;
            color: var(--success);
        }

        .pools-table th.sort-desc::after {
            content: ' \2193';
            opacity: 1;
            color: var(--danger);
        }

        .pools-table td {
            padding: 12px 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .pools-table tbody tr {
            transition: all 0.2s;
            cursor: pointer;
        }

        .pools-table tbody tr:hover {
            background: rgba(0, 212, 255, 0.05);
        }

        .pool-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .pool-name {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .token-badge {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 11px;
        }

        .token-badge.btc { background: linear-gradient(135deg, #f7931a, #ffaa33); }
        .token-badge.stock { background: linear-gradient(135deg, var(--success), #00cc66); }
        .token-badge.highapr { background: linear-gradient(135deg, #ff00ff, #ff4757); }

        .network-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            background: rgba(255, 255, 255, 0.1);
        }

        .protocol-badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent-blue);
        }

        .risk-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .risk-low {
            background: rgba(0, 255, 136, 0.15);
            color: var(--success);
        }

        .risk-medium {
            background: rgba(255, 165, 0, 0.15);
            color: var(--warning);
        }

        .risk-high {
            background: rgba(255, 71, 87, 0.15);
            color: var(--danger);
        }

        .semaphore-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .risk-low .semaphore-dot { background: var(--success); }
        .risk-medium .semaphore-dot { background: var(--warning); }
        .risk-high .semaphore-dot { background: var(--danger); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .value-positive {
            color: var(--success);
            font-weight: 600;
        }

        .value-neutral {
            color: var(--text-primary);
            font-weight: 500;
        }

        .external-link {
            color: var(--accent-blue);
            margin-left: 5px;
            font-size: 10px;
        }

        .loading, .no-results {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .no-results i {
            font-size: 40px;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-color);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }

            .stats-bar {
                justify-content: center;
                gap: 15px;
            }

            .tabs {
                overflow-x: auto;
                padding-bottom: 5px;
            }

            .filters-grid {
                grid-template-columns: 1fr;
            }

            .pools-table {
                font-size: 12px;
            }

            .pools-table th,
            .pools-table td {
                padding: 8px 5px;
            }

            .token-badge, .network-badge, .protocol-badge {
                font-size: 10px;
                padding: 2px 6px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-search-dollar"></i>
                    BrazilDeFi Explorer
                </div>
                <div class="stats-bar">
                    <div class="stat-item">
                        <span class="stat-label">Total TVL</span>
                        <span class="stat-value" id="totalTVL">$0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Pools Ativas</span>
                        <span class="stat-value" id="totalPools">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Melhor APR</span>
                        <span class="stat-value" id="bestAPR">0%</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <nav class="tabs-container">
        <div class="tabs">
            <button class="tab-btn topapr active" data-tab="topapr" onclick="switchTab('topapr')">
                <i class="fas fa-trophy"></i>
                Top APR
                <span class="badge" id="badge-topapr">20</span>
            </button>
            <button class="tab-btn" data-tab="stablecoins" onclick="switchTab('stablecoins')">
                <i class="fas fa-coins"></i>
                Stablecoins BR
                <span class="badge" id="badge-stablecoins">30</span>
            </button>
            <button class="tab-btn bitcoin" data-tab="bitcoin" onclick="switchTab('bitcoin')">
                <i class="fab fa-bitcoin"></i>
                Bitcoin Pools
                <span class="badge" id="badge-bitcoin">15</span>
            </button>
            <button class="tab-btn stocks" data-tab="stocks" onclick="switchTab('stocks')">
                <i class="fas fa-chart-line"></i>
                Stocks RWA
                <span class="badge" id="badge-stocks">40</span>
            </button>
        </div>
    </nav>

    <!-- Sector Filter -->
    <section class="sector-filter">
        <div class="sector-buttons">
            <button class="sector-btn active" onclick="setSector('all', this)">
                <i class="fas fa-list"></i> Todos os Setores
            </button>
            <button class="sector-btn" onclick="setSector('stablecoin', this)">
                <i class="fas fa-coins"></i> Stablecoins
            </button>
            <button class="sector-btn" onclick="setSector('bitcoin', this)">
                <i class="fab fa-bitcoin"></i> Bitcoin
            </button>
            <button class="sector-btn" onclick="setSector('stocks', this)">
                <i class="fas fa-chart-line"></i> Ações Tokenizadas
            </button>
        </div>
    </section>

    <section class="search-section">
        <div class="container">
            <div class="search-box">
                <i class="fas fa-search search-icon"></i>
                <input 
                    type="text" 
                    class="search-input" 
                    id="searchInput"
                    placeholder="Buscar pares (ex: WBTC/USDC, AAPLon/USDT, BRZ/USDC...)"
                >
            </div>
            <div class="search-tags" id="searchTags">
                <span class="tag" onclick="searchTag('WBTC')">WBTC</span>
                <span class="tag" onclick="searchTag('cbBTC')">cbBTC</span>
                <span class="tag" onclick="searchTag('AAPL')">AAPL</span>
                <span class="tag" onclick="searchTag('TSLA')">TSLA</span>
                <span class="tag" onclick="searchTag('BRZ')">BRZ</span>
            </div>
        </div>
    </section>

    <section class="filters-section">
        <div class="container">
            <div class="filters-grid">
                <div class="filter-card">
                    <div class="filter-title">
                        <i class="fas fa-network-wired"></i>
                        Redes
                    </div>
                    <div class="filter-options" id="networkFilters">
                        <div class="filter-option">
                            <input type="checkbox" id="eth" value="ethereum" checked>
                            <label for="eth"><span class="network-icon" style="background: #627eea;">E</span> Ethereum</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="bsc" value="bsc" checked>
                            <label for="bsc"><span class="network-icon" style="background: #f0b90b; color: #000;">B</span> BSC</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="polygon" value="polygon" checked>
                            <label for="polygon"><span class="network-icon" style="background: #8247e5;">P</span> Polygon</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="arbitrum" value="arbitrum" checked>
                            <label for="arbitrum"><span class="network-icon" style="background: #2d374b;">A</span> Arbitrum</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="base" value="base" checked>
                            <label for="base"><span class="network-icon" style="background: #0052ff;">B</span> Base</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="solana" value="solana" checked>
                            <label for="solana"><span class="network-icon" style="background: linear-gradient(135deg, #9945FF, #14F195);">S</span> Solana</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="avalanche" value="avalanche" checked>
                            <label for="avalanche"><span class="network-icon" style="background: #e84142;">A</span> Avalanche</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="opmainnet" value="opmainnet" checked>
                            <label for="opmainnet"><span class="network-icon" style="background: #ff0420;">O</span> OP Mainnet</label>
                        </div>
                    </div>
                </div>

                <div class="filter-card">
                    <div class="filter-title">
                        <i class="fas fa-exchange-alt"></i>
                        Protocolos
                    </div>
                    <div class="filter-options" id="protocolFilters">
                        <div class="filter-option">
                            <input type="checkbox" id="uniswap" value="uniswap" checked>
                            <label for="uniswap">Uniswap V3</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="curve" value="curve" checked>
                            <label for="curve">Curve Finance</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="balancer" value="balancer" checked>
                            <label for="balancer">Balancer</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="pancakeswap" value="pancakeswap" checked>
                            <label for="pancakeswap">PancakeSwap</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="sushiswap" value="sushiswap" checked>
                            <label for="sushiswap">SushiSwap</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="raydium" value="raydium" checked>
                            <label for="raydium">Raydium</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="orca" value="orca" checked>
                            <label for="orca">Orca</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="backed" value="backed" checked>
                            <label for="backed">Backed Finance</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="mirror" value="mirror" checked>
                            <label for="mirror">Mirror Protocol</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="aave" value="aave">
                            <label for="aave">Aave</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="aerodrome" value="aerodrome" checked>
                            <label for="aerodrome">Aerodrome</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="camelot" value="camelot" checked>
                            <label for="camelot">Camelot</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="blackhole" value="blackhole" checked>
                            <label for="blackhole">Blackhole CLMM</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="supernova" value="supernova" checked>
                            <label for="supernova">Supernova CL</label>
                        </div>
                    </div>
                </div>

                <div class="filter-card">
                    <div class="filter-title">
                        <i class="fas fa-coins"></i>
                        TVL Mínimo
                    </div>
                    <input 
                        type="number" 
                        class="tvl-input" 
                        id="tvlFilter"
                        placeholder="Valor mínimo em USD"
                        min="0"
                        step="1000"
                    >
                </div>

                <div class="filter-card">
                    <div class="filter-title">
                        <i class="fas fa-shield-alt"></i>
                        Nível de Risco
                    </div>
                    <div class="filter-options">
                        <div class="filter-option">
                            <input type="checkbox" id="riskLow" value="low" checked>
                            <label for="riskLow"><span style="color: var(--success);">●</span> Baixo</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="riskMedium" value="medium" checked>
                            <label for="riskMedium"><span style="color: var(--warning);">●</span> Médio</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="riskHigh" value="high" checked>
                            <label for="riskHigh"><span style="color: var(--danger);">●</span> Alto</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <main class="main-content">
        <div class="container">

        // ============================================
        // ESTADO DA APLICAÇÃO
        // ============================================
        let currentTab = 'topapr';
        let currentSector = 'all';
        let currentData = [...topAPRData];
        let originalData = [...topAPRData];
        let aprSortDirection = 0;
        let tvlSortDirection = 0;

        // ============================================
        // INICIALIZAÇÃO
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 BrazilDeFi Explorer iniciado');
            
            renderTable(currentData);
            setupFilters();
            setupSearch();
            
            updateBadge('topapr', topAPRData.length);
            updateBadge('stablecoins', stablecoinsData.length);
            updateBadge('bitcoin', bitcoinData.length);
            updateBadge('stocks', stocksData.length);
            
            updateStats();
        });

        // ============================================
        // FUNÇÕES DE NAVEGAÇÃO E FILTROS
        // ============================================
        function switchTab(tabName) {
            currentTab = tabName;
            currentSector = 'all';
            aprSortDirection = 0;
            tvlSortDirection = 0;
            
            // Atualiza botões das tabs
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
            
            // Atualiza setor para "all" e botão ativo
            document.querySelectorAll('.sector-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector('.sector-btn').classList.add('active');
            
            // Atualiza título da seção
            const titles = {
                topapr: 'Melhores APRs em Tempo Real',
                stablecoins: 'Pools de Stablecoins Brasileiras',
                bitcoin: 'Pools de Bitcoin Tokenizado',
                stocks: 'Ações Americanas Tokenizadas (RWA)'
            };
            document.getElementById('sectionTitle').textContent = titles[tabName];
            
            // Atualiza tags de busca
            updateSearchTags(tabName);
            
            // Carrega dados da aba
            loadDataForTab(tabName);
            
            // Reseta ordenação visual
            document.getElementById('th-apr').classList.remove('sort-asc', 'sort-desc');
            document.getElementById('th-tvl').classList.remove('sort-asc', 'sort-desc');
        }

        function setSector(sector, btn) {
            currentSector = sector;
            
            // Atualiza botões
            document.querySelectorAll('.sector-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // Aplica filtro
            filterData();
        }

        function updateSearchTags(tab) {
            const tagsContainer = document.getElementById('searchTags');
            const tags = {
                topapr: ['WAVAX', 'USDC', 'WETH', 'WBTC', 'ETH', 'DAI'],
                stablecoins: ['BRZ', 'BRL1', 'BRLA', 'Depix', 'CREAL', 'USDC', 'USDT', 'DAI'],
                bitcoin: ['WBTC', 'cbBTC', 'BTC', 'ETH', 'USDC', 'USDT', 'WSOL', 'DAI'],
                stocks: ['AAPL', 'TSLA', 'MSFT', 'AMZN', 'GOOGL', 'NVDA', 'META', 'NFLX', 'AMD', 'COIN']
            };
            tagsContainer.innerHTML = tags[tab].map(tag => 
                `<span class="tag" onclick="searchTag('${tag}')">${tag}</span>`
            ).join('');
        }

        function loadDataForTab(tab) {
            if (tab === 'topapr') {
                originalData = [...topAPRData];
            } else if (tab === 'stablecoins') {
                originalData = [...stablecoinsData];
            } else if (tab === 'bitcoin') {
                originalData = [...bitcoinData];
            } else if (tab === 'stocks') {
                originalData = [...stocksData];
            }
            
            // Aplica filtros atuais
            filterData();
            updateStats();
        }

        // ============================================
        // FUNÇÕES DE ORDENAÇÃO
        // ============================================
        function sortByAPR() {
            aprSortDirection++;
            if (aprSortDirection > 2) aprSortDirection = 0;
            
            const thAPR = document.getElementById('th-apr');
            thAPR.classList.remove('sort-asc', 'sort-desc');
            
            if (aprSortDirection === 1) {
                currentData.sort((a, b) => a.apr - b.apr);
                thAPR.classList.add('sort-asc');
            } else if (aprSortDirection === 2) {
                currentData.sort((a, b) => b.apr - a.apr);
                thAPR.classList.add('sort-desc');
            } else {
                // Reseta para ordem original após aplicar filtros
                filterData();
            }
            
            renderTable(currentData);
        }

        function sortByTVL() {
            tvlSortDirection++;
            if (tvlSortDirection > 2) tvlSortDirection = 0;
            
            const thTVL = document.getElementById('th-tvl');
            thTVL.classList.remove('sort-asc', 'sort-desc');
            
            if (tvlSortDirection === 1) {
                currentData.sort((a, b) => a.tvl - b.tvl);
                thTVL.classList.add('sort-asc');
            } else if (tvlSortDirection === 2) {
                currentData.sort((a, b) => b.tvl - a.tvl);
                thTVL.classList.add('sort-desc');
            } else {
                // Reseta para ordem original após aplicar filtros
                filterData();
            }
            
            renderTable(currentData);
        }

        // ============================================
        // FUNÇÕES AUXILIARES
        // ============================================
        function formatProtocolName(name) {
            const names = {
                'uniswap': 'Uniswap V3',
                'curve': 'Curve Finance',
                'balancer': 'Balancer',
                'pancakeswap': 'PancakeSwap',
                'sushiswap': 'SushiSwap',
                'aave': 'Aave',
                'raydium': 'Raydium',
                'orca': 'Orca',
                'backed': 'Backed Finance',
                'mirror': 'Mirror Protocol',
                'aerodrome': 'Aerodrome',
                'camelot': 'Camelot',
                'quickswap': 'QuickSwap',
                'baseswap': 'BaseSwap',
                'thena': 'Thena',
                'blackhole': 'Blackhole CLMM',
                'supernova': 'Supernova CL'
            };
            return names[name] || name.charAt(0).toUpperCase() + name.slice(1);
        }

        function getProtocolLink(project, chain) {
            const links = {
                'uniswap': 'https://app.uniswap.org/#/pool',
                'curve': `https://curve.fi/#/${chain || 'ethereum'}/pools`,
                'balancer': `https://app.balancer.fi/#/${chain || 'ethereum'}/pool`,
                'pancakeswap': 'https://pancakeswap.finance/liquidity',
                'sushiswap': 'https://www.sushi.com/pool',
                'aave': 'https://app.aave.com/',
                'raydium': 'https://raydium.io/pools/',
                'orca': 'https://www.orca.so/pools',
                'backed': 'https://backed.fi/',
                'mirror': 'https://mirror.finance/',
                'aerodrome': 'https://aerodrome.finance/liquidity',
                'camelot': 'https://app.camelot.exchange/pools',
                'quickswap': 'https://quickswap.exchange/#/pool',
                'baseswap': 'https://baseswap.fi/liquidity',
                'thena': 'https://www.thena.fi/liquidity',
                'blackhole': 'https://blackhole.finance/',
                'supernova': 'https://supernova.exchange/'
            };
            return links[project] || links['uniswap'];
        }

        function calculateRisk(tvl, apr) {
            if (tvl > 50000000 && apr < 15) return 'low';
            if (tvl > 10000000 || apr < 25) return 'medium';
            return 'high';
        }

        function updateBadge(tab, count) {
            const badge = document.getElementById(`badge-${tab}`);
            if (badge) badge.textContent = count;
        }

        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', () => filterData());
        }

        function searchTag(tag) {
            document.getElementById('searchInput').value = tag;
            filterData();
        }

        function setupFilters() {
            document.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
                checkbox.addEventListener('change', () => filterData());
            });
            document.getElementById('tvlFilter').addEventListener('input', () => filterData());
        }

        function filterData() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const tvlMin = parseFloat(document.getElementById('tvlFilter').value) || 0;
            
            const selectedNetworks = Array.from(document.querySelectorAll('#networkFilters input:checked')).map(cb => cb.value);
            const selectedProtocols = Array.from(document.querySelectorAll('#protocolFilters input:checked')).map(cb => cb.value);
            const selectedRisks = Array.from(document.querySelectorAll('input[id^="risk"]:checked')).map(cb => cb.value);

            currentData = originalData.filter(pool => {
                // Filtro de busca
                const matchesSearch = !searchTerm || 
                    pool.pool.toLowerCase().includes(searchTerm) ||
                    pool.networkName.toLowerCase().includes(searchTerm) ||
                    pool.protocolName.toLowerCase().includes(searchTerm) ||
                    (pool.asset && pool.asset.toLowerCase().includes(searchTerm));
                
                // Filtro de rede
                const matchesNetwork = selectedNetworks.includes(pool.network);
                
                // Filtro de protocolo
                const matchesProtocol = selectedProtocols.includes(pool.protocol);
                
                // Filtro de TVL mínimo
                const matchesTVL = pool.tvl >= tvlMin;
                
                // Filtro de risco
                const matchesRisk = selectedRisks.includes(pool.risk);
                
                // Filtro de setor
                const matchesSector = currentSector === 'all' || pool.sector === currentSector;

                return matchesSearch && matchesNetwork && matchesProtocol && matchesTVL && matchesRisk && matchesSector;
            });

            // Mantém a ordenação atual se houver
            if (aprSortDirection === 1) {
                currentData.sort((a, b) => a.apr - b.apr);
            } else if (aprSortDirection === 2) {
                currentData.sort((a, b) => b.apr - a.apr);
            } else if (tvlSortDirection === 1) {
                currentData.sort((a, b) => a.tvl - b.tvl);
            } else if (tvlSortDirection === 2) {
                currentData.sort((a, b) => b.tvl - a.tvl);
            }

            renderTable(currentData);
            updateStats();
        }

        function renderTable(data) {
            const tbody = document.getElementById('poolsTableBody');
            const resultsCount = document.getElementById('resultsCount');
            
            resultsCount.textContent = `${data.length} itens encontrados`;

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8"><div class="no-results"><i class="fas fa-search"></i><p>Nenhum item encontrado com os filtros selecionados</p></div></td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(pool => {
                let tokenClass = '';
                if (pool.isStock) tokenClass = 'stock';
                else if (pool.pool.includes('WBTC') || pool.pool.includes('cbBTC') || pool.pool.includes('BTC')) tokenClass = 'btc';
                else if (pool.apr > 100) tokenClass = 'highapr';
                
                const token1 = pool.isStock ? pool.asset : pool.pool.split('/')[0];
                const token2 = pool.pool.split('/')[1] || '';
                
                return `
                <tr>
                    <td>
                        <a href="${pool.link}" target="_blank" rel="noopener noreferrer" class="pool-link">
                            <div class="pool-name">
                                <span class="token-badge ${tokenClass}">${token1}</span>
                                <span style="color: var(--text-secondary);">/</span>
                                <span class="token-badge">${token2}</span>
                                <i class="fas fa-external-link-alt external-link"></i>
                            </div>
                        </a>
                    </td>
                    <td><span class="network-badge">${pool.networkName}</span></td>
                    <td><span class="protocol-badge">${pool.protocolName}</span></td>
                    <td class="value-neutral">$${formatNumber(pool.tvl)}</td>
                    <td class="value-neutral">${pool.ratio}</td>
                    <td class="value-neutral">$${formatNumber(pool.volume24h)}</td>
                    <td class="value-positive">${pool.apr.toFixed(2)}%</td>
                    <td>
                        <span class="risk-indicator risk-${pool.risk}">
                            <span class="semaphore-dot"></span>
                            ${pool.risk === 'low' ? 'Baixo' : pool.risk === 'medium' ? 'Médio' : 'Alto'}
                        </span>
                    </td>
                </tr>`;
            }).join('');
        }

        function formatNumber(num) {
            if (num >= 1e12) return (num / 1e12).toFixed(2) + 'T';
            if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
            return num.toFixed(2);
        }

        function updateStats() {
            const totalTVL = currentData.reduce((sum, p) => sum + (p.tvl || 0), 0);
            const bestAPR = currentData.length > 0 ? Math.max(...currentData.map(p => p.apr || 0)) : 0;
            
            document.getElementById('totalTVL').textContent = '$' + formatNumber(totalTVL);
            document.getElementById('totalPools').textContent = currentData.length;
            document.getElementById('bestAPR').textContent = bestAPR > 0 ? bestAPR.toFixed(1) + '%' : 'N/A';
        }
    </script>
